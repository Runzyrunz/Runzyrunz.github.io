<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Projects</title>

    <style>
        body {
            font-family: Arial;
            background: #111;
            color: white;
            text-align: center; 
            margin: 20px;
        }
        
        .video-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            padding: 20px;
        }

        .video {
            flex: 1 1 300px;
            max-width: 500px;
        }
        iframe {
            width: 100%;
            height: 300px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<h1>Video Projects</h1>

<div class="video-container">

    <div class="video">
        <h3>Fishing Trip</h3>
        <iframe 
            width="560" 
            height="315" 
            src="https://www.youtube.com/embed/m-Oy3Tnz-DU?si=goaK_ePYT3nj0fwb" 
            title="YouTube video player" 
            frameborder="0" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
            referrerpolicy="strict-origin-when-cross-origin" 
            allowfullscreen>
        </iframe>
    </div>

    <div class="video">
        <h3>Elizabeth and Danny's Wedding</h3>
        <iframe 
            width="560" 
            height="315" 
            src="https://www.youtube.com/embed/hQJFSMRgOCA?si=3AwPX8Zk1SSDHX5X" 
            title="YouTube video player"   
            frameborder="0" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
            referrerpolicy="strict-origin-when-cross-origin" 
            allowfullscreen>
        </iframe>
    </div>
</div>
</body>
